services:
  mako:
    build:
      context: .
      args:
        MAKO_UID: ${MAKO_UID:-1000}
        MAKO_GID: ${MAKO_GID:-1000}
    env_file: .env
    volumes:
      - ./workspace:/app/workspace
      - ./data:/app/data
      - ./audit:/app/audit
      - ./jobs.json:/app/jobs.json:ro
    restart: unless-stopped

    # Security hardening
    read_only: true
    tmpfs:
      - /tmp:size=64M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # No cap_add needed — curl removed from allowlist

    # Resource limits
    mem_limit: 256m
    cpus: 0.5

    # Logging
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
